name: Build StorXNetwork Sim on CyberLS

on:
  workflow_dispatch:
    inputs:
      run_go_mod_tidy:
        description: 'Run go mod tidy'
        required: false
        default: false
        type: boolean

env:
  BIN_PATH: 'D:\bin'
  TEMP_PATH: 'D:\deployment'

jobs:
  build-storxnetwork-sim:
    runs-on: [self-hosted, windows, CyberLS]
    environment: production
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
        clean: true

    - name: Setup Git Auth for Private Go Modules
      shell: powershell
      env:
        PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
      run: |
        git config --global url."https://x-access-token:$env:PERSONAL_ACCESS_TOKEN@github.com/".insteadOf "https://github.com/"
        go env -w GOPRIVATE=github.com/StorXNetwork/*
        go env -w GONOSUMDB=github.com/StorXNetwork/*
        go env -w GONOPROXY=github.com/StorXNetwork/*
        $gomodcache = if ($env:RUNNER_TEMP) { "$env:RUNNER_TEMP\go-mod-cache" } else { "$env:GITHUB_WORKSPACE\.go-mod-cache" }
        New-Item -ItemType Directory -Force -Path $gomodcache | Out-Null
        go env -w GOMODCACHE=$gomodcache

    - name: Go mod tidy
      if: github.event_name == 'workflow_dispatch' && inputs.run_go_mod_tidy == true
      shell: powershell
      run: go mod tidy

    - name: Fast build storxnetwork-sim.exe
      run: |
        $buildStart = Get-Date
        Write-Host "Building storxnetwork-sim.exe with optimizations..."
        
        # Use Go build cache and skip tests for faster build
        $env:GOFLAGS = "-buildvcs=false"
        
        $buildCmd = "go build -ldflags `"-s -w`" -o `"$env:TEMP_PATH\storxnetwork-sim.exe`" ./cmd/storxnetwork-sim"
        Write-Host "Build command: $buildCmd"
        
        Invoke-Expression $buildCmd
        
        $buildTime = (Get-Date) - $buildStart
        Write-Host "Build completed in $($buildTime.TotalSeconds) seconds"
        
        if (Test-Path "$env:TEMP_PATH\storxnetwork-sim.exe") {
          $size = (Get-Item "$env:TEMP_PATH\storxnetwork-sim.exe").Length
          Write-Host "storxnetwork-sim.exe built successfully ($([math]::Round($size/1MB, 2)) MB)"
        } else {
          Write-Error "Build failed - storxnetwork-sim.exe not found"
          exit 1
        }
        
    - name: Quick service stop
      shell: powershell
      run: |
        Set-Location $env:BIN_PATH
        $service = Get-Service -Name storxnetworksatellite -ErrorAction SilentlyContinue
        if (-not $service) {
          Write-Host "Service storxnetworksatellite not found; skipping stop"
          exit 0
        }
        if ($service.Status -eq "Running" -or $service.Status -eq "Paused" -or $service.Status -eq "StartPending") {
          $ErrorActionPreference = "Continue"
          & ".\nssm.exe" stop storxnetworksatellite 2>&1 | Out-Null
          $ErrorActionPreference = "Stop"
          Start-Sleep -Seconds 2
        }
        
    - name: Quick file replacement
      run: |
        # Minimal file operations
        if (Test-Path "$env:BIN_PATH\storxnetwork-sim.exe") {
          Remove-Item "$env:BIN_PATH\storxnetwork-sim.exe" -Force -ErrorAction SilentlyContinue
        }
        Move-Item "$env:TEMP_PATH\storxnetwork-sim.exe" "$env:BIN_PATH\storxnetwork-sim.exe" -Force
        Write-Host "storxnetwork-sim.exe replaced"
        
    - name: Quick service start
      shell: powershell
      run: |
        Set-Location $env:BIN_PATH
        $service = Get-Service -Name storxnetworksatellite -ErrorAction SilentlyContinue
        if (-not $service) {
          Write-Host "Service storxnetworksatellite not found; skipping start (binary deployed to $env:BIN_PATH\storxnetwork-sim.exe)"
          exit 0
        }

        $maxWait = 10
        while ($maxWait -gt 0 -and ($service.Status -match "Pending")) {
          Start-Sleep -Seconds 1
          $service.Refresh()
          $maxWait--
        }

        if ($service.Status -eq "Stopped") {
          $ErrorActionPreference = "Continue"
          $result = & cmd /c ".\nssm.exe" start storxnetworksatellite 2>&1 | Out-String
          $ErrorActionPreference = "Stop"
          Start-Sleep -Seconds 3
          $service.Refresh()

          if ($result -match "Can't open service") {
            Write-Host "NSSM could not open storxnetworksatellite; binary deployed without service restart"
            exit 0
          }
          if ($result -match "SERVICE_START_PENDING" -or $service.Status -eq "Running" -or $service.Status -eq "StartPending") {
            Write-Host "Service started successfully (Status: $($service.Status))"
            exit 0
          }
          Write-Host "NSSM start output: $result"
          Write-Host "Service status: $($service.Status)"
          exit 0
        }

        if ($service.Status -eq "Running") {
          Write-Host "Service already running"
          exit 0
        }

        Write-Host "Service in unexpected state: $($service.Status)"
