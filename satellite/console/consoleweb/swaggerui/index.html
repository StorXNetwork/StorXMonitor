<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StorX Monitor API Documentation</title>
    <link rel="stylesheet" type="text/css" href="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui.css">
    <script src="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui-bundle.js"></script>
</head>
<body>
    <div id="swagger-ui"></div>
    <script>
        // Browsers forbid setting the Cookie request header from JS. Swagger's Authorize
        // dialog stores apiKey values; we mirror them into document.cookie for same-origin requests.
        function getAuthorizedValue(ui, schemeName) {
            try {
                const authorized = ui.getSystem().authSelectors.authorized();
                const entry = authorized && authorized.get && authorized.get(schemeName);
                if (!entry) {
                    return '';
                }
                return entry.get ? entry.get('value') : entry.value;
            } catch (e) {
                return '';
            }
        }

        function setCookie(name, value) {
            if (!value) {
                return;
            }
            document.cookie = name + '=' + encodeURIComponent(value) + '; path=/; SameSite=Lax';
        }

        function syncAuthCookiesFromSwagger(ui) {
            try {
                const tokenKey = getAuthorizedValue(ui, 'CookieAuth');
                if (tokenKey) {
                    setCookie('_tokenKey', tokenKey);
                }

                const csrfToken = getAuthorizedValue(ui, 'CSRFAuth');
                if (csrfToken) {
                    setCookie('csrf_token', csrfToken);
                }
            } catch (e) {
                console.warn('swagger auth cookie sync:', e);
            }
        }

        function authorizeCSRF(ui, csrfToken) {
            if (!csrfToken || !ui || !ui.authActions || !ui.authActions.authorize) {
                return;
            }
            try {
                ui.authActions.authorize({
                    CSRFAuth: {
                        name: 'X-CSRF-Token',
                        schema: {
                            type: 'apiKey',
                            in: 'header',
                            name: 'X-CSRF-Token'
                        },
                        value: csrfToken
                    }
                });
            } catch (e) {
                console.warn('swagger CSRF authorize:', e);
            }
        }

        // Routes documented at server root (not under /api/v0) are tagged in swagger.json
        // descriptions with "server root". Swagger UI still prefixes basePath, so rewrite
        // /api/v0/resources-list -> /resources-list (and the same for payment-plans, etc.).
        function collectRootPathsFromSpec(spec) {
            const rootPaths = new Set();
            if (!spec || !spec.paths) {
                return rootPaths;
            }

            for (const [path, methods] of Object.entries(spec.paths)) {
                for (const op of Object.values(methods)) {
                    if (op && typeof op.description === 'string' && op.description.includes('server root')) {
                        rootPaths.add(path);
                        break;
                    }
                }
            }

            return rootPaths;
        }

        function rewriteRootPathRequest(req, rootPaths, basePath) {
            if (!rootPaths || rootPaths.size === 0) {
                return req;
            }

            try {
                const url = new URL(req.url, window.location.origin);
                const normalizedBase = (basePath || '/api/v0').replace(/\/$/, '');

                for (const path of rootPaths) {
                    const prefixedPath = normalizedBase + path;
                    if (url.pathname === prefixedPath) {
                        url.pathname = path;
                        req.url = url.toString();
                        break;
                    }
                }
            } catch (e) {
                console.warn('swagger root path rewrite:', e);
            }

            return req;
        }

        function initSwaggerUI(spec) {
            const rootPaths = collectRootPathsFromSpec(spec);
            const basePath = (spec && spec.basePath) || '/api/v0';
            let ui;

            ui = SwaggerUIBundle({
                spec: spec,
                dom_id: '#swagger-ui',
                deepLinking: true,
                withCredentials: true,
                persistAuthorization: true,
                presets: [
                    SwaggerUIBundle.presets.apis,
                    SwaggerUIBundle.SwaggerUIStandalonePreset
                ],
                plugins: [
                    SwaggerUIBundle.plugins.DownloadUrl
                ],
                layout: "BaseLayout",
                requestInterceptor: function(req) {
                    syncAuthCookiesFromSwagger(ui);
                    req.credentials = 'include';
                    return rewriteRootPathRequest(req, rootPaths, basePath);
                },
                responseInterceptor: function(res) {
                    try {
                        if (res.url && res.url.indexOf('/config') !== -1 && res.status >= 200 && res.status < 300 && res.text) {
                            const body = JSON.parse(res.text);
                            if (body.csrfToken) {
                                setCookie('csrf_token', body.csrfToken);
                                authorizeCSRF(ui, body.csrfToken);
                            }
                        }
                    } catch (e) {
                        console.warn('swagger config CSRF capture:', e);
                    }
                    return res;
                }
            });
            window.ui = ui;
        }

        window.onload = function() {
            fetch('./swagger.json')
                .then(function(response) {
                    if (!response.ok) {
                        throw new Error('failed to load swagger.json');
                    }
                    return response.json();
                })
                .then(initSwaggerUI)
                .catch(function(err) {
                    console.error('swagger init failed:', err);
                });
        };
    </script>
</body>
</html>
