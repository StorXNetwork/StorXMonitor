securityDefinitions:
  ApiKeyAuth:
    in: header
    name: Authorization
    type: apiKey
  CookieAuth:
    in: cookie
    name: _tokenKey
    type: apiKey
swagger: "2.0"
tags:
- description: 'Project management: invitations, members, usage, and project CRUD'
  name: projects
- description: 'Storage & bandwidth trends: GET /api/v0/projects/{id}/daily-usage
    — daily storageUsage and settledBandwidthUsage (bytes per day) for charts'
  name: projects-daily-usage
- description: 'Bucket management: usage-totals (paginated per-bucket usage), usage-totals-for-reserved,
    and bucket APIs'
  name: buckets
- description: 'Reserved integration vault usage: GET /api/v0/buckets/usage-totals-for-reserved
    — bucketName, storage (GB), objectCount per vault (Google Backup, Dropbox, etc.)'
  name: buckets-reserved-usage
- description: API key management operations
  name: api-keys
- description: Payment and billing operations
  name: payments
- description: Analytics operations
  name: analytics
- description: 'Google Backup: GET /auth/register-google and GET /auth/login-google
    (Google OAuth only), plus auto-sync job proxy to Backup-Tools'
  name: google-backup
- description: 'Google Backup shared policies: schedule, retention, merge (Backup-Tools
    /auto-sync/policy/*)'
  name: google-backup-policy
- description: 'Google Backup authentication: POST /google-backup/google-auth (Backup-Tools
    google-auth JWT)'
  name: google-backup-auth
- description: 'Google Backup manual restore: synchronous vault → Google (POST /google-backup/google/*,
    max 10 keys). Call POST /google-backup/google-auth first.'
  name: google-backup-restore-manual
- description: 'Google Backup restore-all (async): Backup-Tools worker cron proxies
    (/restore/all, /restore/live, /restore/job/*)'
  name: google-backup-restore-cron
- description: 'Account & session: profile, settings, refresh-session, developer-access,
    MFA, FCM tokens, notification-preferences'
  name: auth-account
- description: 'Access management: GET /api/v0/api-keys/list-paged (paginated keys),
    POST /v1/access (exchange access grant for S3 credentials on auth host)'
  name: access
- description: 'In-app notifications: GET/PUT /api/v0/notifications (list, count,
    detail, dismiss, read-all)'
  name: notifications
- description: 'Public billing plans: GET /payment-plans at server root (not under
    /api/v0). Swagger may show /api/v0/payment-plans — use the host root path when
    calling.'
  name: payment-plans
- description: 'Public console bootstrap config: GET /api/v0/config (feature flags,
    API base URL, CSRF token, billing/UI toggles)'
  name: config
