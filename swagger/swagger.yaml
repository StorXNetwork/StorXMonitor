    get:
      description: '**Full route:** `GET /api/v0/user/notification-preferences`. Settings
        → Notification preferences. Without `category`: returns a JSON **array** of
        all preference rows. With `category`: returns a single preference **object**
        for that category. Each row `Preferences` map uses keys `push`, `email`, `sms`
        with minimum priority levels 1–4 (marketing, info, warning, critical).'
      parameters:
      - description: 'Optional filter: billing, backup, account, vault'
        enum:
        - billing
        - backup
        - account
        - vault
        in: query
        name: category
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/consoleapi.UserNotificationPreferenceSwagger'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
        "401":
