        required: true
        type: integer
      - description: 'Sort field: 1=name, 2=created, 3=creator email'
        example: 1
        in: query
        name: order
        required: true
        type: integer
      - description: Sort direction
        example: 1
        in: query
        name: orderDirection
        required: true
        type: integer
      - description: Name search filter
