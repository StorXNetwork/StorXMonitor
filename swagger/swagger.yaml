        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
      security:
      - CookieAuth: []
      summary: Delete account (admin)
      tags:
      - auth-account
    get:
      description: '**Full route:** `GET /api/v0/auth/account`'
      produces:
