          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
      security:
      - CookieAuth: []
      summary: Get notification preferences
      tags:
      - settings-notification-preferences
    put:
      consumes:
      - application/json
      description: '**Full route:** `PUT /api/v0/user/notification-preferences`. Settings
        → Notification preferences. Upserts one category row. `category` required.
        `preferences` may include any of `push`, `email`, `sms` — each value is minimum
        priority to receive: 1=marketing, 2=info, 3=warning, 4=critical (string names
        `marketing`/`info`/`warning`/`critical` also accepted). Returns `201` on create,
        `200` on update.'
      parameters:
      - description: Category and channel preferences
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/consoleapi.UpsertUserNotificationPreferenceSwaggerRequest'
