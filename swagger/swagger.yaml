info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: API documentation for StorX Monitor server
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: StorX Monitor API
  version: "1.0"
paths:
  /api-keys/list-paged:
    get:
      description: '**Full route:** `GET /api/v0/api-keys/list-paged`'
      parameters:
      - description: Project UUID
        in: query
        name: projectID
        required: true
        type: string
      - description: Page size
        example: 10
        in: query
        name: limit
        required: true
        type: integer
      - description: Page number (1-based)
        example: 1
        in: query
        name: page
        required: true
        type: integer
      - description: 'Sort field: 1=name, 2=created, 3=creator email'
        example: 1
        in: query
        name: order
        required: true
        type: integer
      - description: Sort direction
        example: 1
        in: query
        name: orderDirection
        required: true
        type: integer
      - description: Name search filter
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/consoleapi.APIKeysListPagedSwaggerResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
      security:
      - CookieAuth: []
      summary: List API keys (paginated)
      tags:
      - access
  /auth/account:
    delete:
      consumes:
      - application/json
      description: '**Full route:** `DELETE /api/v0/auth/account`'
      parameters:
