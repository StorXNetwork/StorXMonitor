          description: OK
          schema:
            $ref: '#/definitions/consoleapi.UserNotificationPreferenceSwagger'
        "201":
          description: Created
          schema:
            $ref: '#/definitions/consoleapi.UserNotificationPreferenceSwagger'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
      security:
