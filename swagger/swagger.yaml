basePath: /api/v0
definitions:
  consoleapi.BackupToolsJSONResponse:
    additionalProperties: true
    type: object
  consoleapi.CreateGoogleBackupAutoSyncJobsSwaggerRequest:
    properties:
      emails:
        example:
        - billing@salestalker.com
        - support@salestalker.com
        items:
          type: string
        type: array
      interval:
        example: 6h
        type: string
      "on":
        example: ""
        type: string
      services:
        example:
        - gmail
        - drive
        items:
          type: string
        type: array
    required:
    - interval
    - services
    type: object
  consoleapi.DashboardButtonSwagger:
    properties:
      click:
        example: ""
        type: string
      color:
        example: '#2563EB'
        type: string
      link:
        example: /billing
        type: string
      text:
        example: Upgrade
        type: string
      textColor:
        example: '#FFFFFF'
        type: string
    type: object
  consoleapi.DashboardIconSwagger:
    properties:
      backgroundColor:
        example: '#E8F0FE'
        type: string
      url:
        example: /static/icons/protected-users.svg
        type: string
    type: object
  consoleapi.DashboardStatsCardSwaggerResponse:
    properties:
      button:
        $ref: '#/definitions/consoleapi.DashboardButtonSwagger'
      description:
        example: Google accounts with backup enabled
        type: string
      icon:
        $ref: '#/definitions/consoleapi.DashboardIconSwagger'
      status:
        $ref: '#/definitions/consoleapi.DashboardStatusSwagger'
      title:
        example: Protected Users
        type: string
      value_1:
        example: "124"
        type: string
      value_1_label:
        example: ""
        type: string
      value_2:
        example: +2 this week
        type: string
      value_2_label:
        example: growth_this_week
        type: string
    type: object
  consoleapi.DashboardStatusSwagger:
    properties:
      backgroundColor:
        example: '#18DB351A'
        type: string
      textColor:
        example: '#388E3C'
        type: string
      value:
        example: 84% Used
        type: string
    type: object
  consoleapi.GoogleBackupAuthSwaggerRequest:
    properties:
      google_key:
        example: <Google OAuth id_token or access_token>
        type: string
    required:
    - google_key
    type: object
  consoleapi.GoogleBackupAuthSwaggerResponse:
    properties:
      google-auth:
        example: eyJhbGciOiJIUzI1NiIs...
        type: string
    type: object
  consoleapi.GoogleBackupConnectSwaggerRequest:
    properties:
      code:
        example: 4/0AeanS...
        type: string
    required:
    - code
    type: object
  consoleapi.GoogleBackupConnectSwaggerResponse:
    properties:
      created:
        example: true
        type: boolean
      google_email:
        example: user@gmail.com
        type: string
      success:
        example: true
        type: boolean
    type: object
  consoleapi.GoogleBackupDomainUsersSwaggerResponse:
    properties:
      google_backup:
        type: object
      success:
        example: true
        type: boolean
    type: object
  consoleapi.GoogleBackupManualRestoreSwaggerRequest:
    properties:
      google_auth:
        example: <JWT from POST /google-backup/google-auth>
        type: string
      keys:
        example:
        - dXNlckBnbWFpbC5jb20vcGF0aC9maWxl
        items:
          type: string
        type: array
      storx_access_grant:
        example: <storx access grant>
        type: string
    required:
    - google_auth
    - keys
    - storx_access_grant
    type: object
  consoleapi.GoogleBackupRegisterSuccess:
    properties:
      google_backup:
        type: object
      success:
        example: true
        type: boolean
    type: object
  consoleapi.GoogleBackupRestoreAllSwaggerRequest:
    properties:
      google_auth:
        example: <JWT from POST /google-backup/google-auth>
        type: string
      login_id:
        example: user@gmail.com
        type: string
      service:
        example: drive
        type: string
      storx_access_grant:
        example: <storx access grant>
        type: string
    required:
    - google_auth
    - login_id
    - service
    - storx_access_grant
    type: object
  consoleapi.GoogleOAuthJSONError:
    properties:
      error:
        example: Error getting token from Google
        type: string
      redirect_url:
        example: https://storx.io/login
        type: string
    type: object
  consoleapi.GoogleOAuthJSONSuccess:
    properties:
      redirect_url:
        example: https://storx.io/
        type: string
      success:
        example: true
        type: boolean
    type: object
  consoleapi.ProjectDailyUsageResponse:
    properties:
      allocatedBandwidthUsage:
        items:
          $ref: '#/definitions/consoleapi.ProjectUsageByDayItem'
        type: array
      settledBandwidthUsage:
        items:
          $ref: '#/definitions/consoleapi.ProjectUsageByDayItem'
        type: array
      storageUsage:
        items:
          $ref: '#/definitions/consoleapi.ProjectUsageByDayItem'
        type: array
    type: object
  consoleapi.ProjectUsageByDayItem:
    properties:
      date:
        example: "2026-05-26T00:00:00Z"
        type: string
      value:
        example: 9007199254740992
        type: integer
    type: object
  consoleapi.ReservedBucketUsageItem:
    properties:
      before:
        example: "2026-05-28T10:00:00Z"
        type: string
      bucketName:
        example: gmail
        type: string
      createdAt:
        example: "2024-03-20T10:00:00Z"
        type: string
      egress:
        example: 12.3
        type: number
      location:
        example: us-east-1
        type: string
      objectCount:
        example: 124
        type: integer
      projectID:
        example: 00000000-0000-0000-0000-000000000001
        type: string
      segmentCount:
        example: 500
        type: integer
      since:
        example: "2024-03-20T10:00:00Z"
        type: string
      storage:
        example: 210.5
        type: number
    type: object
  consoleapi.SwaggerErrorResponse:
    properties:
      error:
        example: error message
        type: string
    type: object
  consoleapi.UpdateGoogleBackupAutoSyncJobsByProjectSwaggerRequest:
    properties:
      active:
        example: true
        type: boolean
      code:
        example: ""
        type: string
      google_email:
        example: user@gmail.com
        type: string
      interval:
        example: nightly
        type: string
      "on":
        example: 12am
        type: string
      project_id:
        example: 00000000-0000-0000-0000-000000000000
        type: string
      refresh_token:
        example: <google refresh token>
        type: string
      storx_token:
        example: <storx access grant>
        type: string
    required:
    - google_email
    - project_id
    type: object
  consoleapi.UpdateGoogleBackupAutoSyncPolicySwaggerRequest:
    properties:
      interval:
        example: 3h
        type: string
      "on":
        example: ""
        type: string
    required:
    - interval
    type: object
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: API documentation for StorX Monitor server
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: StorX Monitor API
  version: "1.0"
paths:
  /auth/login-google:
    get:
      description: 'Google OAuth callback. Browser flow (no json param): 302 redirect
        to the web app. Swagger/Postman: set `json=true` (required below) for JSON
        + Set-Cookie `_tokenKey` with no redirect — then Authorize CookieAuth and
        call google-backup routes. Does not change browser behavior.'
      parameters:
      - description: Must be true in Swagger/API clients (uses existing ?json= query
          on SendResponse)
        in: query
        name: json
        required: true
        type: boolean
      - description: Fresh Google OAuth code (single-use)
        in: query
        name: code
        required: true
        type: string
      - description: OAuth state
        in: query
        name: state
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 'Set-Cookie: _tokenKey'
          schema:
            $ref: '#/definitions/consoleapi.GoogleOAuthJSONSuccess'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/consoleapi.GoogleOAuthJSONError'
      summary: Login with Google (login-google)
      tags:
      - google-backup
  /auth/register-google:
    get:
      description: Google OAuth signup callback. Success is always JSON. On error,
        browser gets 302; use `json=true` in Swagger/Postman for JSON errors (existing
        SendResponse behavior).
      parameters:
      - description: Fresh Google OAuth code (single-use)
        in: query
        name: code
        required: true
        type: string
      - description: OAuth state (UTM / verifier payload)
        in: query
        name: state
        type: string
      - description: When true, inserts CRM lead in Zoho
        in: query
        name: zoho-insert
        type: boolean
      - description: Set true in Swagger when testing error paths (avoids redirect)
        in: query
        name: json
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: 'Set-Cookie: _tokenKey'
          schema:
            $ref: '#/definitions/consoleapi.GoogleBackupRegisterSuccess'
        "500":
          description: When json=true on failed callback
          schema:
            $ref: '#/definitions/consoleapi.GoogleOAuthJSONError'
      summary: Register with Google (register-google)
      tags:
      - google-backup
  /buckets/usage-totals-for-reserved:
    get:
      description: '**Full route:** `GET /api/v0/buckets/usage-totals-for-reserved`'
      parameters:
      - description: Project UUID
        in: query
        name: projectID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/consoleapi.ReservedBucketUsageItem'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
      security:
      - CookieAuth: []
      summary: Reserved vault usage totals
      tags:
      - buckets-reserved-usage
  /dashboard/stats:
    get:
      description: '**Full route:** `GET /api/v0/dashboard/stats`'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/consoleapi.DashboardStatsCardSwaggerResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
      security:
      - CookieAuth: []
      summary: Dashboard stats cards
      tags:
      - dashboard
  /google-backup/auto-sync/jobs:
    get:
      description: '**Full route:** `GET /api/v0/google-backup/auto-sync/jobs`'
      parameters:
      - description: Optional Backup-Tools filter
        in: query
        name: filter
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/consoleapi.BackupToolsJSONResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
      security:
      - CookieAuth: []
      summary: List Google Backup auto-sync jobs
      tags:
      - google-backup
    post:
      consumes:
      - application/json
      description: '**Full route:** `POST /api/v0/google-backup/auto-sync/jobs`'
      parameters:
      - description: Backup-Tools sync type (default daily)
        in: query
        name: sync_type
        type: string
      - description: Job create request
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/consoleapi.CreateGoogleBackupAutoSyncJobsSwaggerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/consoleapi.BackupToolsJSONResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
      security:
      - CookieAuth: []
      summary: Create Google Backup auto-sync jobs
      tags:
      - google-backup
  /google-backup/auto-sync/jobs/{job_id}:
    get:
      description: '**Full route:** `GET /api/v0/google-backup/auto-sync/jobs/{job_id}`'
      parameters:
      - description: Job ID
        in: path
        name: job_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/consoleapi.BackupToolsJSONResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
      security:
      - CookieAuth: []
      summary: Get Google Backup auto-sync job
      tags:
      - google-backup
  /google-backup/auto-sync/jobs/{job_id}/policy:
    get:
      description: '**Full route:** `GET /api/v0/google-backup/auto-sync/jobs/{job_id}/policy`'
      parameters:
      - description: Job ID
        in: path
        name: job_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/consoleapi.BackupToolsJSONResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
      security:
      - CookieAuth: []
      summary: Get Google Backup policy for job
      tags:
      - google-backup
  /google-backup/auto-sync/jobs/project:
    put:
      consumes:
      - application/json
      description: '**Full route:** `PUT /api/v0/google-backup/auto-sync/jobs/project`'
      parameters:
      - description: Project-scoped update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/consoleapi.UpdateGoogleBackupAutoSyncJobsByProjectSwaggerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/consoleapi.BackupToolsJSONResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
      security:
      - CookieAuth: []
      summary: Update Google Backup jobs by project
      tags:
      - google-backup
  /google-backup/auto-sync/policy:
    get:
      description: '**Full route:** `GET /api/v0/google-backup/auto-sync/policy`'
      parameters:
      - description: Backup-Tools credential ID
        in: query
        name: credential_id
        type: string
      - description: Storj project ID (with google_email)
        in: query
        name: project_id
        type: string
      - description: Google account email (with project_id)
        in: query
        name: google_email
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/consoleapi.BackupToolsJSONResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
      security:
      - CookieAuth: []
      summary: List Google Backup auto-sync policies
      tags:
      - google-backup
  /google-backup/auto-sync/policy/{policy_id}:
    get:
      description: '**Full route:** `GET /api/v0/google-backup/auto-sync/policy/{policy_id}`'
      parameters:
      - description: Policy ID
        in: path
        name: policy_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/consoleapi.BackupToolsJSONResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
      security:
      - CookieAuth: []
      summary: Get Google Backup auto-sync policy
      tags:
      - google-backup
    put:
      consumes:
      - application/json
      description: '**Full route:** `PUT /api/v0/google-backup/auto-sync/policy/{policy_id}`'
      parameters:
      - description: Policy ID
        in: path
        name: policy_id
        required: true
        type: string
      - description: Policy schedule update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/consoleapi.UpdateGoogleBackupAutoSyncPolicySwaggerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/consoleapi.BackupToolsJSONResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
      security:
      - CookieAuth: []
      summary: Update Google Backup auto-sync policy schedule
      tags:
      - google-backup
  /google-backup/connect:
    post:
      consumes:
      - application/json
      description: '**Full route:** `POST /api/v0/google-backup/connect`'
      parameters:
      - description: OAuth authorization code
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/consoleapi.GoogleBackupConnectSwaggerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/consoleapi.GoogleBackupConnectSwaggerResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
      security:
      - CookieAuth: []
      summary: Connect Google account for backup
      tags:
      - google-backup
  /google-backup/domain-users:
    get:
      description: '**Full route:** `GET /api/v0/google-backup/domain-users`'
      parameters:
      - description: 'Google account email (default: latest credential for user)'
        in: query
        name: google_email
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/consoleapi.GoogleBackupDomainUsersSwaggerResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
      security:
      - CookieAuth: []
      summary: Gmail corporate domain-users
      tags:
      - google-backup
  /google-backup/google-auth:
    post:
      consumes:
      - application/json
      description: Proxies Backup-Tools POST /google-auth. Call before restore-all
        or manual restore. Pass Google OAuth id_token or access_token as google_key.
      parameters:
      - description: Google OAuth token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/consoleapi.GoogleBackupAuthSwaggerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/consoleapi.GoogleBackupAuthSwaggerResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
      security:
      - CookieAuth: []
      summary: Exchange Google token for Backup-Tools auth JWT
      tags:
      - google-backup-auth
  /google-backup/google/gmail/insert-mail:
    post:
      consumes:
      - application/json
      description: 'Proxies Backup-Tools POST /google/gmail/insert-mail (max 10 base64
        vault keys). Requires POST /google-backup/google-auth first. Headers: Authorization,
        ACCESS_TOKEN (or body fields).'
      parameters:
      - description: Vault keys (forwarded as JSON array to Backup-Tools)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/consoleapi.GoogleBackupManualRestoreSwaggerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/consoleapi.BackupToolsJSONResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
      security:
      - CookieAuth: []
      summary: Manual restore Gmail messages
      tags:
      - google-backup-restore-manual
  /google-backup/google/satellite-to-calendar:
    post:
      consumes:
      - application/json
      description: Proxies Backup-Tools POST /google/satellite-to-calendar (max 10
        base64 vault keys).
      parameters:
      - description: Vault keys
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/consoleapi.GoogleBackupManualRestoreSwaggerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/consoleapi.BackupToolsJSONResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
      security:
      - CookieAuth: []
      summary: Manual restore Google Calendar
      tags:
      - google-backup-restore-manual
  /google-backup/google/satellite-to-contacts:
    post:
      consumes:
      - application/json
      description: Proxies Backup-Tools POST /google/satellite-to-contacts (max 10
        base64 vault keys).
      parameters:
      - description: Vault keys
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/consoleapi.GoogleBackupManualRestoreSwaggerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/consoleapi.BackupToolsJSONResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
      security:
      - CookieAuth: []
      summary: Manual restore Google Contacts
      tags:
      - google-backup-restore-manual
  /google-backup/google/satellite-to-drive:
    post:
      consumes:
      - application/json
      description: Proxies Backup-Tools POST /google/satellite-to-drive (max 10 base64
        vault keys).
      parameters:
      - description: Vault keys
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/consoleapi.GoogleBackupManualRestoreSwaggerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/consoleapi.BackupToolsJSONResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
      security:
      - CookieAuth: []
      summary: Manual restore Google Drive
      tags:
      - google-backup-restore-manual
  /google-backup/google/satellite-to-photos:
    post:
      consumes:
      - application/json
      description: Proxies Backup-Tools POST /google/satellite-to-photos (max 10 base64
        vault keys).
      parameters:
      - description: Vault keys
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/consoleapi.GoogleBackupManualRestoreSwaggerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/consoleapi.BackupToolsJSONResponse'
        "400":
          description: Bad Request
          schema:
