        google_contacts); Active/Inactive → `active` (true/false, user toggle); Success/Failed/Running
        → `status` (success, failed, in_progress, in_queue, created — last run, not
        same as active); Search bar → `name` (partial email). No `search` param on
        job list — use `filter.name`. Mailbox/domain search → `GET .../users-groups?search=...`.
        See `GET .../auto-sync/jobs/filter-schema` for examples.'
      parameters:
      - description: URL-encoded AutosyncJobListFilter JSON. See definitions and GET
          .../auto-sync/jobs/filter-schema for four examples.
        example: '%7B%22method%22%3A%22gmail%22%2C%22active%22%3Atrue%2C%22status%22%3A%22failed%22%7D'
