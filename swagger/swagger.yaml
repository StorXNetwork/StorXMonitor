info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: API documentation for StorX Monitor server
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: StorX Monitor API
  version: "1.0"
paths:
  /api-keys/list-paged:
    get:
      description: '**Full route:** `GET /api/v0/api-keys/list-paged`'
      parameters:
      - description: Project UUID
        in: query
        name: projectID
        required: true
        type: string
      - description: Page size
        example: 10
        in: query
        name: limit
        required: true
        type: integer
      - description: Page number (1-based)
        example: 1
        in: query
        name: page
        required: true
        type: integer
      - description: 'Sort field: 1=name, 2=created, 3=creator email'
        example: 1
        in: query
        name: order
        required: true
        type: integer
      - description: Sort direction
        example: 1
        in: query
        name: orderDirection
        required: true
        type: integer
      - description: Name search filter
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/consoleapi.APIKeysListPagedSwaggerResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
      security:
      - CookieAuth: []
      summary: List API keys (paginated)
      tags:
      - access
  /audit-logs:
    get:
      description: '**Full route:** `GET /api/v0/audit-logs`'
      parameters:
      - description: Filter by action code (e.g. AUTH_LOGIN)
        in: query
        name: action
        type: string
      - description: Filter by status
        enum:
        - success
        - failed
        in: query
        name: status
        type: string
      - description: Search action, resource, message, or record id
        in: query
        name: search
        type: string
      - description: Range start (RFC3339)
        example: "2026-06-01T00:00:00Z"
        in: query
        name: from
        type: string
      - description: Range end (RFC3339)
        example: "2026-06-02T23:59:59Z"
        in: query
        name: to
        type: string
      - default: 50
        description: Page size (default 50)
        in: query
        name: limit
        type: integer
      - description: Pagination cursor from previous response NextCursor
        in: query
        name: cursor
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/consoleapi.AuditLogListSwaggerResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
      security:
      - CookieAuth: []
      summary: List audit logs
      tags:
      - audit-logs
  /audit-logs/actions:
    get:
      description: '**Full route:** `GET /api/v0/audit-logs/actions`'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/consoleapi.AuditLogActionsSwaggerResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
      security:
      - CookieAuth: []
      summary: List audit log action codes
      tags:
      - audit-logs
  /audit-logs/export:
    get:
      description: '**Full route:** `GET /api/v0/audit-logs/export`'
      parameters:
      - description: Filter by action code
        in: query
        name: action
        type: string
      - description: Filter by status
        enum:
        - success
        - failed
        in: query
        name: status
        type: string
      - description: Search action, resource, message, or record id
        in: query
        name: search
        type: string
      - description: Range start (RFC3339)
        example: "2026-06-01T00:00:00Z"
        in: query
        name: from
        type: string
      - description: Range end (RFC3339)
        example: "2026-06-02T23:59:59Z"
        in: query
        name: to
        type: string
      - description: Max rows per batch (internal pagination)
        in: query
        name: limit
        type: integer
      - description: Pagination cursor
        in: query
        name: cursor
        type: string
      produces:
      - text/csv
      responses:
        "200":
          description: 'CSV file (Content-Disposition: audit-logs.csv)'
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/consoleapi.SwaggerErrorResponse'
      security:
      - CookieAuth: []
      summary: Export audit logs as CSV
      tags:
      - audit-logs
