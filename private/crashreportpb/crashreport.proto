syntax = "proto3";
option go_package = "github.com/StorXNetwork/StorXMonitor/private/crashreportpb";

package crash;

service CrashReport {
    rpc Report(ReportRequest) returns(ReportResponse) {}
}

message ReportRequest {
    bytes gzipped_panic = 1;
}

message ReportResponse {}
